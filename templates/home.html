{% extends 'base.html' %}
{% block title %}Home - AMPKen{% endblock %}

{% block content %}
<section id="home" class="hero-section">
    <!-- Static Home Image with Welcome Text -->
    <div class="home-image-container">
        <div class="home-image" style="background-image: url('{{ url_for('static', filename='image5.jpg') }}');">
            <div class="welcome-text">
                <h1>Welcome to AMPKen</h1>
                <p>Advancing the field of medical physics in Kenya through education, research, and professional development.</p>
                <a href="{{ url_for('about') }}" class="cta-button">Learn More</a>
            </div>
        </div>
    </div>

    <!-- Image Carousel -->
    <div class="image-carousel">
        <div class="carousel-container">
            <div class="carousel-slide">
                <img src="{{ url_for('static', filename='image1.jpg') }}" alt="Carousel Image 1">
               
            </div>
            <div class="carousel-slide">
                <img src="{{ url_for('static', filename='image2.jpg') }}" alt="Carousel Image 2">
                
            </div>
            <div class="carousel-slide">
                <img src="{{ url_for('static', filename='image3.jpg') }}" alt="Carousel Image 3">
                
            </div>
            <div class="carousel-slide">
                <img src="{{ url_for('static', filename='image2.png') }}" alt="Carousel Image 4">
                
            </div>
            <div class="carousel-slide">
                <img src="{{ url_for('static', filename='image6.jpg') }}" alt="Carousel Image 6">
                
            </div>
        </div>
        <button class="carousel-button prev">&lt;</button>
        <button class="carousel-button next">&gt;</button>
    </div>
</section>
{% endblock %}
